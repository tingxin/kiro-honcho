services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # 不对外暴露端口，仅通过 nginx 反向代理访问
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - DB_SSL_CA=global-bundle.pem
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5025:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
